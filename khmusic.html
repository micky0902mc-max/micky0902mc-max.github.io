    <h1>高雄流行音樂中心 (Kaohsiung Music Center)</h1>
    
    <img src="https://images.unsplash.com/photo-1628151475739-16ff5bc4e5e7?auto=format&fit=crop&w=800&q=80" alt="高雄流行音樂中心" width="600" height="400">

    <p>高雄流行音樂中心位於高雄港11-15號碼頭，由西班牙建築團隊與台灣團隊共同設計。其外觀設計緊扣「海洋」意象，包含了代表珊瑚礁群的「珊瑚礁群」建築、浪花意象的「高低塔」，是非常具代表性的現代建築奇蹟。</p>
