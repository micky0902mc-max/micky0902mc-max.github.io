    <h1>網頁製作學習心得</h1>

    <blockquote>
        <strong>「從零到一建構屬於自己的網站，是跨領域學習的寶貴經驗。」</strong>
    </blockquote>

    <p>在這次的個人網站製作作業中，我學到了如何使用基本的 HTML 標籤（如標題、段落、超連結與圖片插入）來搭建網頁的骨架。同時也學會了利用行內樣式（Style）來替網頁加上背景顏色與排版，讓網頁看起來更整潔。</p>

    <p>此外，透過這堂課，我也第一次接觸到了 GitHub。利用 GitHub Repository 與 GitHub Pages 功能，我們不需要自己花錢買伺服器，就能把靜態網頁發佈到網路上讓全世界看到。雖然在設定超連結路徑時出了一點小錯，但經過調整後成功連線，這讓我非常有成就感！</p>
